<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone do Pinterest - Visualização de Pin</title>
    <style>
        /* =========================================
           VARIÁVEIS CSS E TEMA ESCURO (CORES PREMIUM)
           ========================================= */
        :root {
            --cor-fundo: #ffffff; 
            --cor-card: #ffffff; 
            --cor-header: rgba(255, 255, 255, 0.85);
            --cor-texto: #111111; 
            --cor-texto-secundario: #767676; 
            --cor-hover: #e9e9e9;
            --cor-pesquisa: #e9e9e9; 
            --cor-modal: rgba(255, 255, 255, 0.95); 
            --cor-borda: #efefef;
            --cor-primaria: #e60023;
            --cor-primaria-hover: #ad081b;
            --sombra-suave: 0 2px 12px rgba(0, 0, 0, 0.08); 
            --sombra-forte: 0 12px 36px rgba(0, 0, 0, 0.15);
            --raio-borda: 16px;
            --transicao: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        body.dark-mode {
            --cor-fundo: #0f0f0f; 
            --cor-card: #1f1f1f; 
            --cor-header: rgba(15, 15, 15, 0.85);
            --cor-texto: #ffffff; 
            --cor-texto-secundario: #a3a3a3; 
            --cor-hover: #2a2a2a;
            --cor-pesquisa: #2a2a2a; 
            --cor-modal: rgba(20, 20, 20, 0.95); 
            --cor-borda: #333333;
            --sombra-suave: 0 4px 12px rgba(0, 0, 0, 0.3); 
            --sombra-forte: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; 
            margin: 0; padding: 0; background-color: var(--cor-fundo); color: var(--cor-texto); 
            transition: background-color var(--transicao), color var(--transicao); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: var(--cor-texto-secundario); border-radius: 10px; border: 2px solid var(--cor-fundo); }

        /* =========================================
           TELA DE LOGIN
           ========================================= */
        #tela-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--cor-fundo) 0%, var(--cor-pesquisa) 100%);
            z-index: 3000; display: flex; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease;
        }
        .login-box {
            background-color: var(--cor-card); padding: 48px 40px; border-radius: 32px;
            box-shadow: var(--sombra-forte); text-align: center; max-width: 420px; width: 90%; 
            border: 1px solid var(--cor-borda);
        }
        .login-logo { 
            color: var(--cor-primaria); font-size: 50px; font-weight: 900; 
            margin-bottom: 16px; display: inline-block; 
            background: var(--cor-hover); width: 80px; height: 80px; 
            border-radius: 50%; line-height: 80px;
        }
        .login-input { 
            width: 100%; padding: 16px 20px; margin-bottom: 20px; border-radius: 16px; 
            border: 2px solid transparent; background: var(--cor-pesquisa); 
            color: var(--cor-texto); font-size: 16px; box-sizing: border-box; 
            outline: none; transition: var(--transicao); font-weight: 500;
        }
        .login-input:focus { border-color: var(--cor-texto-secundario); background: var(--cor-fundo); }
        
        .btn-entrar { 
            background-color: var(--cor-primaria); color: white; border: none; 
            padding: 16px 24px; border-radius: 30px; font-size: 16px; font-weight: 700; 
            cursor: pointer; width: 100%; transition: transform 0.2s, background-color 0.2s; 
        }
        .btn-entrar:hover { background-color: var(--cor-primaria-hover); transform: scale(1.02); }
        .btn-entrar:active { transform: scale(0.98); }

        /* =========================================
           HEADER E NAVEGAÇÃO
           ========================================= */
        .navbar { 
            display: flex; align-items: center; padding: 12px 24px; background-color: var(--cor-header); 
            position: sticky; top: 0; z-index: 1000; gap: 16px; backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--cor-borda); 
        }
        .logo { 
            color: var(--cor-primaria); font-size: 26px; font-weight: 900; 
            text-decoration: none; cursor: pointer; width: 48px; height: 48px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; transition: var(--transicao);
        }
        .logo:hover { background-color: var(--cor-hover); }
        
        .nav-links { display: flex; gap: 4px; }
        .nav-btn { 
            border: none; background: transparent; font-size: 16px; font-weight: 600; 
            padding: 12px 18px; border-radius: 30px; cursor: pointer; color: var(--cor-texto); transition: var(--transicao); 
        }
        .nav-btn.active { background-color: var(--cor-texto); color: var(--cor-fundo); }
        .nav-btn:hover:not(.active) { background-color: var(--cor-hover); }
        
        .search-bar { 
            flex-grow: 1; display: flex; align-items: center; background-color: var(--cor-pesquisa); 
            border-radius: 30px; height: 48px; padding: 0 20px; transition: var(--transicao); border: 2px solid transparent;
        }
        .search-bar:focus-within { border-color: var(--cor-texto-secundario); background-color: var(--cor-fundo); }
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; color: var(--cor-texto); margin-left: 12px; font-size: 16px; font-weight: 500;}
        
        .nav-icons { display: flex; gap: 8px; }
        .icon-btn { 
            border: none; background: transparent; font-size: 22px; width: 48px; height: 48px; 
            border-radius: 50%; cursor: pointer; color: var(--cor-texto); transition: var(--transicao);
        }
        .icon-btn:hover { background-color: var(--cor-hover); }

        .categorias-bar { 
            display: flex; gap: 12px; padding: 16px 24px; background-color: var(--cor-header); 
            position: sticky; top: 73px; z-index: 999; overflow-x: auto; white-space: nowrap; 
            backdrop-filter: blur(10px);
        }
        .categorias-bar::-webkit-scrollbar { height: 0px; }
        .btn-categoria { 
            border: none; background-color: var(--cor-pesquisa); padding: 12px 20px; 
            border-radius: 24px; font-weight: 600; font-size: 15px; cursor: pointer; 
            color: var(--cor-texto); text-transform: capitalize; transition: var(--transicao);
        }
        .btn-categoria:hover:not(.ativo) { background-color: var(--cor-hover); }
        .btn-categoria.ativo { background-color: var(--cor-texto); color: var(--cor-fundo); }

        /* =========================================
           GRID DE PINS
           ========================================= */
        .pinterest-grid { column-count: 5; column-gap: 16px; padding: 24px 48px; margin: 0 auto; max-width: 1800px; }
        .pin { 
            background-color: var(--cor-pesquisa); border-radius: var(--raio-borda); 
            margin-bottom: 16px; break-inside: avoid; position: relative; overflow: hidden; 
            background-size: cover; background-position: center; opacity: 0; 
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            cursor: zoom-in; transform: translateZ(0);
        }
        .small { height: 250px; } .medium { height: 350px; } .large { height: 450px; } .extra { height: 280px; }
        
        @keyframes slideUpFade { 
            0% { opacity: 0; transform: translateY(30px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%); 
            opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 16px; box-sizing: border-box; 
        }
        .pin:hover .overlay { opacity: 1; }
        
        .autor-tag { 
            background: rgba(255, 255, 255, 0.2); color: #fff; padding: 6px 14px; 
            border-radius: 20px; font-size: 13px; align-self: flex-start; 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            font-weight: 600; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .btn-salvar { 
            background-color: var(--cor-primaria); color: white; border: none; 
            border-radius: 30px; padding: 12px 20px; font-weight: 700; font-size: 15px; 
            cursor: pointer; align-self: flex-end; transition: var(--transicao); 
        }
        .btn-salvar:hover { background-color: var(--cor-primaria-hover); transform: scale(1.05); }
        .btn-salvar:active { transform: scale(0.95); }
        .btn-salvar.salvo { background-color: #111; color: white; }
        
        .bottom-actions { display: flex; justify-content: flex-end; gap: 8px; width: 100%; }
        .btn-curtir { 
            background-color: rgba(255, 255, 255, 0.85); border: none; border-radius: 50%; 
            width: 44px; height: 44px; cursor: pointer; font-size: 20px; display: flex; 
            align-items: center; justify-content: center; backdrop-filter: blur(4px); 
            transition: var(--transicao); color: #111;
        }
        .btn-curtir:hover { background-color: white; transform: scale(1.1); }
        .btn-curtir:active { transform: scale(0.9); }

        @media (max-width: 1400px) { .pinterest-grid { column-count: 4; } }
        @media (max-width: 1000px) { .pinterest-grid { column-count: 3; padding: 20px; } }
        @media (max-width: 700px) { .pinterest-grid { column-count: 2; padding: 10px; } .nav-btn { display: none;} .nav-btn.active{display:block;} }

        /* =========================================
           SESSÃO DE PERFIL
           ========================================= */
        .escondido { display: none !important; }
        #perfil-usuario { padding: 60px 20px 20px; text-align: center; }
        .perfil-avatar { 
            width: 120px; height: 120px; background-color: var(--cor-pesquisa); 
            border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; 
            justify-content: center; font-size: 48px; text-transform: uppercase; 
            font-weight: 700; color: var(--cor-texto); border: 2px solid var(--cor-borda);
        }
        .perfil-nome { font-size: 36px; font-weight: 800; margin: 0 0 16px; letter-spacing: -0.5px; }
        
        .btn-logout { 
            background-color: var(--cor-pesquisa); color: var(--cor-texto); border: none; 
            border-radius: 30px; padding: 12px 24px; font-weight: 700; cursor: pointer; 
            transition: var(--transicao); font-size: 15px;
        }
        .btn-logout:hover { background-color: var(--cor-hover); }

        .perfil-tabs { 
            display: flex; justify-content: center; gap: 24px; margin-top: 48px; 
            margin-bottom: 32px; 
        }
        .perfil-tab { 
            border: none; background: transparent; font-size: 16px; font-weight: 600; 
            padding: 12px 4px; cursor: pointer; color: var(--cor-texto-secundario); 
            position: relative; transition: var(--transicao);
        }
        .perfil-tab:hover { color: var(--cor-texto); }
        .perfil-tab.ativa { color: var(--cor-texto); }
        .perfil-tab.ativa::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; 
            height: 3px; background-color: var(--cor-texto); border-radius: 3px 3px 0 0;
        }
        
        .mensagem-vazia { text-align: center; color: var(--cor-texto-secundario); grid-column: 1 / -1; width: 100%; margin-top: 60px; font-weight: 500; font-size: 18px;}

        /* =========================================
           MODAIS (GERAL)
           ========================================= */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.7); z-index: 2000; align-items: center; 
            justify-content: center; padding: 20px; box-sizing: border-box; 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .fechar-modal { 
            position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; 
            background: var(--cor-pesquisa); color: var(--cor-texto); border-radius: 50%; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; 
            transition: var(--transicao); z-index: 10;
        }
        .fechar-modal:hover { background: var(--cor-hover); color: var(--cor-primaria); }

        /* MODAL CRIAR */
        .modal-content { 
            background-color: var(--cor-card); border-radius: 24px; width: 100%; 
            max-width: 500px; padding: 40px; position: relative; box-shadow: var(--sombra-forte); 
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; box-sizing: border-box; 
        }
        .form-criar { display: flex; flex-direction: column; gap: 20px; margin-top: 10px;}
        .form-criar label { font-weight: 600; font-size: 14px; margin-bottom: -10px; color: var(--cor-texto); }
        .form-criar input[type="text"] { 
            padding: 16px; border-radius: 12px; border: 2px solid var(--cor-borda); 
            background: transparent; color: var(--cor-texto); font-size: 16px; outline: none; transition: 0.2s;
        }
        .form-criar input[type="text"]:focus { border-color: var(--cor-texto-secundario); }
        .form-criar input[type="file"] {
            padding: 16px; border: 2px dashed var(--cor-borda); border-radius: 12px;
            background: var(--cor-pesquisa); cursor: pointer; color: var(--cor-texto-secundario);
        }

        /* MODAL VISUALIZAR PIN */
        .modal-visualizar-content {
            background-color: var(--cor-card); border-radius: 32px; width: 100%; max-width: 900px;
            display: flex; overflow: hidden; box-shadow: var(--sombra-forte); position: relative;
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; max-height: 85vh;
        }
        .vis-layout { display: flex; width: 100%; }
        .vis-imagem-container { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            background: var(--cor-fundo); max-width: 50%;
        }
        .vis-imagem-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .vis-info-container { 
            flex: 1; padding: 40px; display: flex; flex-direction: column; overflow-y: auto;
        }
        .vis-top-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 30px; }
        .vis-titulo { font-size: 32px; font-weight: 800; margin: 0 0 16px 0; line-height: 1.2;}
        .vis-autor-info { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .vis-autor-avatar { 
            width: 48px; height: 48px; background: var(--cor-pesquisa); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
        }
        .vis-autor-nome { font-weight: 600; font-size: 16px; }

        @media (max-width: 768px) {
            .vis-layout { flex-direction: column; }
            .vis-imagem-container { max-width: 100%; height: 350px; }
            .modal-visualizar-content { max-height: 95vh; overflow-y: auto; display: block; }
        }
    </style>
</head>
<body class="dark-mode">

    <div id="tela-login">
        <div class="login-box">
            <div class="login-logo">P</div>
            <h2 style="margin-top:0; font-size: 28px;">Bem-vindo(a)</h2>
            <p style="color: var(--cor-texto-secundario); margin-bottom: 32px; line-height: 1.5;">Faça login para testar o algoritmo e ver as ideias de outras pessoas.</p>
            
            <input type="text" id="login-nome" class="login-input" placeholder="Digite seu nome (ex: Maria)">
            <button class="btn-entrar" id="btn-fazer-login">Entrar no App</button>
        </div>
    </div>

    <div id="app-principal" class="escondido">
        <header class="navbar">
            <div class="logo" id="btn-logo">P</div>
            <div class="nav-links">
                <button class="nav-btn active" id="btn-nav-home">Página inicial</button>
                <button class="nav-btn" id="btn-nav-criar">Criar</button>
            </div>
            <div class="search-bar">
                <span style="font-size: 18px; color: var(--cor-texto-secundario);">🔍</span>
                <input type="text" id="input-pesquisa" placeholder="Pesquisar...">
            </div>
            <div class="nav-icons">
                <button class="icon-btn" id="btn-dark-mode" title="Mudar Tema">☀️</button>
                <button class="icon-btn" id="btn-nav-perfil" title="Seu Perfil">👤</button>
            </div>
        </header>

        <main id="conteudo-principal">
            <div class="categorias-bar" id="barra-categorias">
                <button class="btn-categoria ativo" data-filtro="todas">Para você</button>
                <button class="btn-categoria" data-filtro="aesthetic">Aesthetic</button>
                <button class="btn-categoria" data-filtro="arquitetura">Arquitetura</button>
                <button class="btn-categoria" data-filtro="arte">Arte</button>
                <button class="btn-categoria" data-filtro="natureza">Natureza</button>
                <button class="btn-categoria" data-filtro="tecnologia">Tecnologia</button>
            </div>
            <div class="pinterest-grid" id="grid-pins"></div>
        </main>

        <section id="sessao-perfil" class="escondido">
            <div id="perfil-usuario">
                <div class="perfil-avatar" id="avatar-letra">U</div>
                <h1 class="perfil-nome" id="nome-usuario-logado">Usuário</h1>
                <p style="color: var(--cor-texto-secundario); margin-bottom: 24px;">@<span id="username-display">usuario</span></p>
                <button class="btn-logout" id="btn-logout">Trocar de conta</button>
                
                <div class="perfil-tabs">
                    <button class="perfil-tab ativa" id="tab-salvos">Salvos</button>
                    <button class="perfil-tab" id="tab-curtidos">Curtidos</button>
                    <button class="perfil-tab" id="tab-criados">Criados</button>
                </div>
            </div>
            <div class="pinterest-grid" id="grid-perfil-conteudo"></div>
        </section>
    </div>

    <div id="modal-criar" class="modal">
        <div class="modal-content">
            <div class="fechar-modal" id="btn-fechar-criar">&times;</div>
            <h2 style="margin-top: 0; font-size: 24px;">Criar Pin</h2>
            <div class="form-criar">
                <label>Escolha uma imagem</label>
                <input type="file" id="input-imagem-nova" accept="image/*">
                
                <label>Título do seu Pin</label>
                <input type="text" id="input-titulo-novo" placeholder="Adicione um título detalhado">
                
                <label>Categoria (Tag)</label>
                <input type="text" id="input-categoria-nova" placeholder="Ex: tecnologia, arte, setup...">
                
                <button class="btn-publicar" id="btn-salvar-novo-pin">Salvar e Publicar</button>
            </div>
        </div>
    </div>

    <div id="modal-visualizar" class="modal">
        <div class="modal-visualizar-content">
            <div class="fechar-modal" id="btn-fechar-visualizar">&times;</div>
            <div class="vis-layout">
                <div class="vis-imagem-container">
                    <img id="vis-img" src="" alt="Pin Image">
                </div>
                <div class="vis-info-container">
                    <div class="vis-top-bar">
                        <button class="btn-curtir" id="vis-btn-curtir" style="background: var(--cor-pesquisa);">🤍</button>
                        <button class="btn-salvar" id="vis-btn-salvar">Salvar</button>
                    </div>
                    <h2 class="vis-titulo" id="vis-titulo">Título do Pin</h2>
                    
                    <div class="vis-autor-info">
                        <div class="vis-autor-avatar" id="vis-autor-letra">U</div>
                        <div class="vis-autor-nome" id="vis-autor-nome">Nome do Autor</div>
                    </div>
                    
                    <div>
                        <span class="btn-categoria ativo" id="vis-categoria-tag" style="cursor: default;">Categoria</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // BANCO DE DADOS GLOBAL E USUÁRIO
        // ==========================================
        let postsGlobais = JSON.parse(localStorage.getItem('pinterest_posts_globais')) || [];
        
        let usuarioLogado = null;
        let meusPinsSalvos = [];
        let meusPinsCurtidos = [];
        let meusInteresses = {};
        
        // Variavel para guardar o pin que está aberto no Modal no momento
        let pinAbertoNoModal = null; 

        const telaLogin = document.getElementById('tela-login');
        const appPrincipal = document.getElementById('app-principal');

        const userSalvo = localStorage.getItem('pinterest_usuario_atual');
        if (userSalvo) {
            fazerLogin(userSalvo);
        }

        document.getElementById('btn-fazer-login').addEventListener('click', () => {
            const nome = document.getElementById('login-nome').value.trim();
            if (nome) fazerLogin(nome);
            else alert("Digite um nome para entrar!");
        });

        function fazerLogin(nome) {
            usuarioLogado = nome;
            localStorage.setItem('pinterest_usuario_atual', nome);
            
            meusPinsSalvos = JSON.parse(localStorage.getItem(`pins_salvos_${nome}`)) || [];
            meusPinsCurtidos = JSON.parse(localStorage.getItem(`pins_curtidos_${nome}`)) || [];
            meusInteresses = JSON.parse(localStorage.getItem(`interesses_${nome}`)) || {};

            document.getElementById('nome-usuario-logado').textContent = nome;
            document.getElementById('avatar-letra').textContent = nome.charAt(0);
            document.getElementById('username-display').textContent = nome.toLowerCase().replace(/\s+/g, '');
            
            telaLogin.style.opacity = '0';
            setTimeout(() => {
                telaLogin.style.display = 'none';
                appPrincipal.classList.remove('escondido');
                carregarFeedPrincipal();
            }, 500);
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('pinterest_usuario_atual');
            window.location.reload();
        });

        function salvarDadosUsuario() {
            localStorage.setItem(`pins_salvos_${usuarioLogado}`, JSON.stringify(meusPinsSalvos));
            localStorage.setItem(`pins_curtidos_${usuarioLogado}`, JSON.stringify(meusPinsCurtidos));
            localStorage.setItem(`interesses_${usuarioLogado}`, JSON.stringify(meusInteresses));
        }

        function registrarInteresse(categoria) {
            if (!categoria) return;
            const catLower = categoria.toLowerCase();
            meusInteresses[catLower] = (meusInteresses[catLower] || 0) + 1;
            salvarDadosUsuario();
        }

        // ==========================================
        // MODAL CRIAR
        // ==========================================
        const modalCriar = document.getElementById('modal-criar');
        document.getElementById('btn-nav-criar').addEventListener('click', () => modalCriar.style.display = 'flex');
        document.getElementById('btn-fechar-criar').addEventListener('click', () => modalCriar.style.display = 'none');
        // Fechar ao clicar fora
        modalCriar.addEventListener('click', (e) => { if(e.target === modalCriar) modalCriar.style.display = 'none'; });

        document.getElementById('btn-salvar-novo-pin').addEventListener('click', () => {
            const inputImg = document.getElementById('input-imagem-nova');
            const titulo = document.getElementById('input-titulo-novo').value.trim();
            const categoria = document.getElementById('input-categoria-nova').value.trim().toLowerCase();
            
            if (inputImg.files.length > 0 && titulo && categoria) {
                const file = inputImg.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const novaPostagem = {
                        id: Date.now().toString(),
                        url: e.target.result, 
                        titulo: titulo,
                        categoria: categoria,
                        autor: usuarioLogado
                    };
                    postsGlobais.unshift(novaPostagem); 
                    localStorage.setItem('pinterest_posts_globais', JSON.stringify(postsGlobais));
                    registrarInteresse(categoria); 
                    
                    modalCriar.style.display = 'none';
                    document.getElementById('input-imagem-nova').value = '';
                    document.getElementById('input-titulo-novo').value = '';
                    document.getElementById('input-categoria-nova').value = '';
                    document.querySelector('[data-filtro="todas"]').click(); 
                };
                reader.readAsDataURL(file);
            } else {
                alert('Preencha todos os campos e selecione uma imagem!');
            }
        });

        // ==========================================
        // MODAL VISUALIZAR PIN
        // ==========================================
        const modalVisualizar = document.getElementById('modal-visualizar');
        document.getElementById('btn-fechar-visualizar').addEventListener('click', () => {
            modalVisualizar.style.display = 'none';
            // Recarrega a tela de fundo para atualizar os icones caso tenham mudado no modal
            if(document.getElementById('sessao-perfil').classList.contains('escondido')) {
                carregarFeedPrincipal();
            } else {
                document.querySelector('.perfil-tab.ativa').click();
            }
        });
        
        modalVisualizar.addEventListener('click', (e) => { 
            if(e.target === modalVisualizar) document.getElementById('btn-fechar-visualizar').click(); 
        });

        function abrirVisualizacao(dadosPin) {
            pinAbertoNoModal = dadosPin;
            
            document.getElementById('vis-img').src = dadosPin.url;
            document.getElementById('vis-titulo').textContent = dadosPin.titulo;
            document.getElementById('vis-categoria-tag').textContent = dadosPin.categoria;
            
            const autor = dadosPin.autor ? dadosPin.autor : 'Pinterest Bot';
            document.getElementById('vis-autor-nome').textContent = autor;
            document.getElementById('vis-autor-letra').textContent = autor.charAt(0).toUpperCase();

            const btnCurtirModal = document.getElementById('vis-btn-curtir');
            const btnSalvarModal = document.getElementById('vis-btn-salvar');

            // Verifica se o usuário já tem esse pin salvo/curtido para pintar os botões do modal
            if (meusPinsSalvos.find(p => p.url === dadosPin.url)) {
                btnSalvarModal.classList.add('salvo');
                btnSalvarModal.textContent = 'Salvo';
            } else {
                btnSalvarModal.classList.remove('salvo');
                btnSalvarModal.textContent = 'Salvar';
            }

            if (meusPinsCurtidos.find(p => p.url === dadosPin.url)) {
                btnCurtirModal.classList.add('curtido');
                btnCurtirModal.textContent = '❤️';
            } else {
                btnCurtirModal.classList.remove('curtido');
                btnCurtirModal.textContent = '🤍';
            }

            modalVisualizar.style.display = 'flex';
        }

        // Lógica dos botões DENTRO do modal de visualizar
        document.getElementById('vis-btn-curtir').addEventListener('click', function() {
            this.classList.toggle('curtido');
            if (this.classList.contains('curtido')) {
                this.textContent = '❤️';
                if (!meusPinsCurtidos.find(p => p.url === pinAbertoNoModal.url)) {
                    meusPinsCurtidos.push(pinAbertoNoModal);
                    registrarInteresse(pinAbertoNoModal.categoria);
                }
            } else {
                this.textContent = '🤍';
                meusPinsCurtidos = meusPinsCurtidos.filter(p => p.url !== pinAbertoNoModal.url);
            }
            salvarDadosUsuario();
        });

        document.getElementById('vis-btn-salvar').addEventListener('click', function() {
            this.classList.toggle('salvo');
            if (this.classList.contains('salvo')) {
                this.textContent = 'Salvo';
                if (!meusPinsSalvos.find(p => p.url === pinAbertoNoModal.url)) {
                    meusPinsSalvos.push(pinAbertoNoModal);
                    registrarInteresse(pinAbertoNoModal.categoria);
                }
            } else {
                this.textContent = 'Salvar';
                meusPinsSalvos = meusPinsSalvos.filter(p => p.url !== pinAbertoNoModal.url);
            }
            salvarDadosUsuario();
        });

        // ==========================================
        // RENDERIZAÇÃO E INTERAÇÃO NO FEED
        // ==========================================
        const gridPrincipal = document.getElementById('grid-pins');
        let filtroAtual = 'todas';

        function criarHTMLdoPin(pinData, tamanho) {
            const pin = document.createElement('div');
            pin.className = `pin ${tamanho}`;
            pin.setAttribute('data-id', pinData.id);
            pin.setAttribute('data-url', pinData.url);
            pin.setAttribute('data-categoria', pinData.categoria);
            pin.setAttribute('data-titulo', pinData.titulo);
            if(pinData.autor) pin.setAttribute('data-autor', pinData.autor);
            
            pin.style.backgroundImage = `url('${pinData.url}')`;
            
            const tagAutor = pinData.autor ? `<div class="autor-tag">${pinData.autor}</div>` : '';
            
            pin.innerHTML = `
                <div class="overlay">
                    ${tagAutor}
                    <div style="flex-grow: 1;"></div>
                    <button class="btn-salvar">Salvar</button>
                    <div class="bottom-actions">
                        <button class="btn-curtir">🤍</button>
                    </div>
                </div>`;
            return pin;
        }

        function carregarFeedPrincipal(quantidade = 15) {
            gridPrincipal.innerHTML = '';
            const tamanhos = ['small', 'medium', 'large', 'extra'];
            let postsParaMostrar = [];
            
            if (filtroAtual === 'todas') {
                postsGlobais.forEach(post => {
                    if (meusInteresses[post.categoria] > 0 || post.autor !== usuarioLogado) {
                        postsParaMostrar.push(post);
                    }
                });
            } else {
                postsParaMostrar = postsGlobais.filter(p => p.categoria.includes(filtroAtual));
            }

            postsParaMostrar.slice(0, 10).forEach((post, i) => {
                const tamanho = tamanhos[Math.floor(Math.random() * tamanhos.length)];
                const pin = criarHTMLdoPin(post, tamanho);
                aplicarEstadoBotoes(pin, post.url);
                pin.style.animationDelay = `${i * 0.05}s`;
                gridPrincipal.appendChild(pin);
            });

            const palavrasChave = ["aesthetic", "architecture", "art", "nature", "technology"];
            const geradosFaltantes = quantidade - postsParaMostrar.length;
            
            for (let i = 0; i < (geradosFaltantes > 5 ? geradosFaltantes : 10); i++) {
                const tamanho = tamanhos[Math.floor(Math.random() * tamanhos.length)];
                let catGerada = filtroAtual !== 'todas' ? filtroAtual : palavrasChave[Math.floor(Math.random() * palavrasChave.length)];
                
                if (filtroAtual === 'todas' && Object.keys(meusInteresses).length > 0 && Math.random() < 0.3) {
                    const categoriasSalvas = Object.keys(meusInteresses);
                    catGerada = categoriasSalvas[Math.floor(Math.random() * categoriasSalvas.length)];
                }

                const idMock = Math.floor(Math.random() * 100000);
                let height = tamanho === 'small' ? 300 : tamanho === 'large' ? 600 : 450;
                const url = `https://loremflickr.com/400/${height}/${catGerada}?lock=${idMock}`;
                
                const mockPost = { id: idMock.toString(), url: url, titulo: `Ideia de ${catGerada}`, categoria: catGerada, autor: null };
                
                const pin = criarHTMLdoPin(mockPost, tamanho);
                aplicarEstadoBotoes(pin, url);
                pin.style.animationDelay = `${(postsParaMostrar.length + i) * 0.05}s`;
                gridPrincipal.appendChild(pin);
            }
        }

        function aplicarEstadoBotoes(pinElement, url) {
            if (meusPinsSalvos.find(item => item.url === url)) {
                pinElement.querySelector('.btn-salvar').classList.add('salvo');
                pinElement.querySelector('.btn-salvar').textContent = 'Salvo';
            }
            if (meusPinsCurtidos.find(item => item.url === url)) {
                pinElement.querySelector('.btn-curtir').classList.add('curtido');
                pinElement.querySelector('.btn-curtir').textContent = '❤️';
            }
        }

        function manipularAcaoPin(e) {
            const btnSalvar = e.target.closest('.btn-salvar');
            const btnCurtir = e.target.closest('.btn-curtir');
            const pin = e.target.closest('.pin');
            
            if (!pin) return;

            const dadosPin = {
                id: pin.getAttribute('data-id'), 
                url: pin.getAttribute('data-url'),
                categoria: pin.getAttribute('data-categoria'), 
                titulo: pin.getAttribute('data-titulo'),
                autor: pin.getAttribute('data-autor') || null
            };

            // Se clicou no botão CURTIR diretamente da grid
            if (btnCurtir) {
                btnCurtir.classList.toggle('curtido');
                if (btnCurtir.classList.contains('curtido')) {
                    btnCurtir.textContent = '❤️';
                    if (!meusPinsCurtidos.find(p => p.url === dadosPin.url)) {
                        meusPinsCurtidos.push(dadosPin);
                        registrarInteresse(dadosPin.categoria); 
                    }
                } else {
                    btnCurtir.textContent = '🤍';
                    meusPinsCurtidos = meusPinsCurtidos.filter(p => p.url !== dadosPin.url);
                }
                salvarDadosUsuario();
                return; // Para a execução aqui para não abrir o modal
            }

            // Se clicou no botão SALVAR diretamente da grid
            if (btnSalvar) {
                btnSalvar.classList.toggle('salvo');
                if (btnSalvar.classList.contains('salvo')) {
                    btnSalvar.textContent = 'Salvo';
                    if (!meusPinsSalvos.find(p => p.url === dadosPin.url)) {
                        meusPinsSalvos.push(dadosPin);
                        registrarInteresse(dadosPin.categoria); 
                    }
                } else {
                    btnSalvar.textContent = 'Salvar';
                    meusPinsSalvos = meusPinsSalvos.filter(p => p.url !== dadosPin.url);
                }
                salvarDadosUsuario();
                return; // Para a execução aqui para não abrir o modal
            }

            // Se clicou em qualquer outro lugar do PIN (abrir visualização)
            abrirVisualizacao(dadosPin);
        }

        document.getElementById('grid-pins').addEventListener('click', manipularAcaoPin);
        document.getElementById('grid-perfil-conteudo').addEventListener('click', manipularAcaoPin);

        // ==========================================
        // NAVEGAÇÃO E TEMA ESCURO
        // ==========================================
        document.getElementById('barra-categorias').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-categoria')) {
                document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('ativo'));
                e.target.classList.add('ativo');
                filtroAtual = e.target.getAttribute('data-filtro');
                carregarFeedPrincipal();
            }
        });

        const btnDarkMode = document.getElementById('btn-dark-mode');
        if (document.body.classList.contains('dark-mode')) btnDarkMode.textContent = '☀️';
        btnDarkMode.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            btnDarkMode.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });

        document.getElementById('btn-nav-perfil').addEventListener('click', () => {
            document.getElementById('conteudo-principal').classList.add('escondido');
            document.getElementById('sessao-perfil').classList.remove('escondido');
            document.getElementById('btn-nav-home').classList.remove('active');
            document.getElementById('tab-salvos').click();
        });

        document.getElementById('btn-nav-home').addEventListener('click', () => {
            document.getElementById('sessao-perfil').classList.add('escondido');
            document.getElementById('conteudo-principal').classList.remove('escondido');
            document.getElementById('btn-nav-home').classList.add('active');
            carregarFeedPrincipal();
        });
        
        document.getElementById('btn-logo').addEventListener('click', () => {
             document.querySelector('[data-filtro="todas"]').click();
             document.getElementById('btn-nav-home').click();
        });

        const tabsPerfil = document.querySelectorAll('.perfil-tab');
        tabsPerfil.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabsPerfil.forEach(t => t.classList.remove('ativa'));
                e.target.classList.add('ativa');
                
                const tipo = e.target.id;
                let listaRenderizar = [];
                
                if (tipo === 'tab-salvos') listaRenderizar = meusPinsSalvos;
                if (tipo === 'tab-curtidos') listaRenderizar = meusPinsCurtidos;
                if (tipo === 'tab-criados') listaRenderizar = postsGlobais.filter(post => post.autor === usuarioLogado);
                
                renderizarPerfil(listaRenderizar);
            });
        });

        function renderizarPerfil(lista) {
            const grid = document.getElementById('grid-perfil-conteudo');
            grid.innerHTML = '';
            if (lista.length === 0) { 
                grid.style.columnCount = 1; 
                grid.innerHTML = `<div class="mensagem-vazia">Nenhum Pin encontrado nesta seção.</div>`; 
                return; 
            }
            grid.style.columnCount = '';
            lista.forEach((post, i) => {
                const pin = criarHTMLdoPin(post, 'medium');
                aplicarEstadoBotoes(pin, post.url);
                pin.style.animationDelay = `${i * 0.05}s`;
                grid.appendChild(pin);
            });
        }
    </script>
</body>
</html>
